<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI HYBRID V22 | B/S + COLOR</title>
<style>
:root{--bg:#020617;--fg:#f1f5f9;--acc:#fbbf24;--win:#10b981;--loss:#ef4444;--card:#0f172a;--shield:#38bdf8;--wait:#94a3b8;--red:#f43f5e;--green:#10b981}
body{background:var(--bg);color:var(--fg);font-family:sans-serif;padding:10px;margin:0;display:flex;flex-direction:column;align-items:center}
.card{width:100%;max-width:380px;background:var(--card);border:2px solid var(--shield);border-radius:20px;padding:20px;text-align:center;box-shadow:0 0 40px rgba(56,189,248,0.3);margin-top:10px}
.signal{font-size:60px;font-weight:900;margin:5px 0;letter-spacing:5px;text-shadow:0 0 20px rgba(251,191,36,0.5)}
.status-bar{width:100%;max-width:380px;display:flex;justify-content:space-between;font-size:11px;margin-bottom:8px;font-weight:bold}
.stat-box{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:15px}
.stat{background:rgba(255,255,255,0.05);padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.1)}
.log-box{width:100%;max-width:380px;margin-top:15px;background:var(--card);border-radius:15px;overflow:hidden;border:1px solid #1e293b}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1e293b;padding:10px;color:var(--shield)}
td{padding:10px;text-align:center;border-bottom:1px solid #1e293b}
#aBtn{width:100%;max-width:380px;margin-top:15px;padding:15px;background:var(--acc);border:none;color:var(--bg);font-weight:900;cursor:pointer;border-radius:12px}
.blink{animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
</style>
</head>
<body>

<div class="status-bar">
    <span id="pStatus" style="color:var(--loss)">○ SYNCING 30S...</span>
    <span style="color:var(--shield)">HYBRID: B/S + CLR</span>
</div>

<div class="card">
    <div id="sig" class="blink" style="color:var(--wait);font-size:24px">SCANNING MARKET...</div>
    <div id="reason" style="font-size:11px;color:var(--shield);margin-top:8px">Dual-Engine Pattern Matching</div>
    
    <div class="stat-box">
        <div class="stat">Surety<br><b id="prob" style="color:var(--win)">0%</b></div>
        <div class="stat">Target<br><b id="targetType" style="color:var(--acc)">SCAN</b></div>
    </div>
</div>

<button onclick="enableAudio()" id="aBtn">ACTIVATE LONG ALERT</button>

<div class="log-box">
    <table>
        <thead><tr><th>Period</th><th>Num</th><th>Size</th><th>Clr</th></tr></thead>
        <tbody id="logs"></tbody>
    </table>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playLongAlert() {
    const now = audioCtx.currentTime;
    [0, 0.4, 0.8].forEach(d => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.setValueAtTime(1000, now + d);
        g.gain.setValueAtTime(0.1, now + d);
        o.start(now + d); o.stop(now + d + 0.3);
    });
}

function enableAudio() { audioCtx.resume(); document.getElementById('aBtn').innerHTML = "🔊 ENGINE ACTIVE"; playLongAlert(); }

(function(){
    const PROXIES = ['https://api.allorigins.win/raw?url=', 'https://corsproxy.io/?', 'https://api.codetabs.com/v1/proxy?quest='];
    const API = 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json?t=';
    let state = { lp:null, streak:0, active:null, target:null, skip:0, pIdx:0 };

    async function sync() {
        for(let i=0; i<PROXIES.length; i++){
            try {
                const res = await fetch(PROXIES[state.pIdx] + encodeURIComponent(API + Date.now()));
                const data = await res.json();
                if(data && data.data) return data;
            } catch(e) { state.pIdx = (state.pIdx + 1) % PROXIES.length; }
        }
        return null;
    }

    function hybridLogic(h) {
        if(state.skip > 0) { state.skip--; return { s:'WAIT', r:'System Cooling', p:'0%', t:'SCAN' }; }
        
        const s = h.map(x => x >= 5 ? 'B' : 'S');
        const c = h.map(x => (x===0||x===5) ? 'V' : (x%2===0 ? 'R' : 'G'));
        const n = h.slice(0, 5);

        // 1. SIZE MOMENTUM (High Priority)
        let d = 1; for(let i=1; i<5; i++){ if(s[i] === s[0]) d++; else break; }
        if(d >= 3 && ((s[0]==='B' && n[0]>=8) || (s[0]==='S' && n[0]<=1))) {
            return { s: s[0]==='B'?'BIG':'SMALL', r:'Size Momentum Follow', p:'94%', t:'SIZE' };
        }

        // 2. COLOR SNIPER (Secondary - If size is choppy)
        let cD = 1; for(let i=1; i<5; i++){ if(c[i] === c[0]) cD++; else break; }
        if(cD >= 3) {
            return { s: c[0]==='R'?'RED':'GREEN', r:'Color Trend Follow', p:'92%', t:'COLOR' };
        }

        // 3. ZIGZAG COLOR (Fast Reversal)
        if(c[0]!==c[1] && c[1]!==c[2]) {
            return { s: c[0]==='R'?'GREEN':'RED', r:'Color ZigZag Sniper', p:'89%', t:'COLOR' };
        }

        // 4. ZIGZAG SIZE
        if(s[0]!==s[1] && s[1]!==s[2]) {
            return { s: s[0]==='B'?'SMALL':'BIG', r:'Size ZigZag Sniper', p:'87%', t:'SIZE' };
        }

        return { s:'WAIT', r:'Analyzing Dual Patterns...', p:'0%', t:'SCAN' };
    }

    async function update() {
        const data = await sync();
        if(!data) return;

        const list = data.data.list;
        const curr = list[0].issueNumber;

        if (curr !== state.lp) {
            document.getElementById('logs').innerHTML = list.slice(0, 10).map(item => {
                const num = parseInt(item.number);
                const clr = (num===0||num===5)?'#a855f7':(num%2===0?'var(--red)':'var(--green)');
                return `<tr><td>${item.issueNumber.slice(-3)}</td><td style="color:${clr};font-weight:bold">${num}</td><td>${num>=5?'B':'S'}</td><td style="color:${clr}">●</td></tr>`;
            }).join('');

            const h = list.map(x => parseInt(x.number));
            
            // Check Win/Loss
            if(state.active && state.active !== 'WAIT') {
                let win = false;
                const lastN = h[0];
                const lastS = lastN >= 5 ? 'BIG' : 'SMALL';
                const lastC = (lastN%2===0) ? 'RED' : 'GREEN';
                win = (state.active === lastS || state.active === lastC);
                state.streak = win ? 0 : state.streak + 1;
                if(win) state.skip = 1;
            }

            const dec = hybridLogic(h);
            const sigEl = document.getElementById('sig');
            
            if(dec.s !== 'WAIT' && state.active === 'WAIT') playLongAlert();

            sigEl.textContent = dec.s === 'WAIT' ? 'WAITING...' : dec.s;
            sigEl.style.fontSize = dec.s === 'WAIT' ? '24px' : '65px';
            
            // Color Coding for Signal
            if(dec.s === 'RED') sigEl.style.color = 'var(--red)';
            else if(dec.s === 'GREEN') sigEl.style.color = 'var(--green)';
            else sigEl.style.color = 'var(--acc)';

            document.getElementById('reason').textContent = dec.r;
            document.getElementById('prob').textContent = dec.p;
            document.getElementById('targetType').textContent = dec.t;
            document.getElementById('pStatus').textContent = '● HYBRID LIVE';
            document.getElementById('pStatus').style.color = 'var(--win)';

            state.active = dec.s; state.lp = curr;
        }
    }
    setInterval(update, 2500); update();
})();
</script>
</body>
</html>
