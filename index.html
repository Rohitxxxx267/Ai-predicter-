<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RJ Wingo Dashboard</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    margin:0;
    padding:0;
}
header{
    background:#111827;
    padding:15px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}
.container{
    padding:15px;
}
button{
    padding:10px 15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.card{
    background:#1e293b;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}
table{
    width:100%;
    margin-top:10px;
    border-collapse:collapse;
}
th,td{
    border:1px solid #334155;
    padding:8px;
    text-align:center;
    font-size:13px;
}
th{
    background:#111827;
}
#prediction{
    font-size:18px;
    color:#22c55e;
    font-weight:bold;
}
</style>

</head>

<body>

<header>🔥 RJ Wingo Live Dashboard</header>

<div class="container">

<button onclick="loadData()">🔄 Load Live Data</button>

<div class="card">
<h3>🎯 Prediction</h3>
<p id="prediction">-</p>
</div>

<div class="card">
<h3>📊 Results</h3>

<table>
<thead>
<tr>
<th>Issue</th>
<th>Number</th>
<th>Size</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

</div>

<script>

// 👉 Render backend URL (change this)
const API = "https://YOUR-RENDER-URL.onrender.com/data";

async function loadData(){
    try{
        let res = await fetch(API);
        let data = await res.json();

        // 🔥 Prediction show
        document.getElementById("prediction").innerText =
        "NEXT: " + data.prediction + " (Last: " + data.lastNumber + ")";

        // 📊 Table fill
        let html = "";

        data.results.forEach(item=>{
            html += `
            <tr>
                <td>${item.issue}</td>
                <td>${item.code}</td>
                <td>${item.bigSmall}</td>
            </tr>`;
        });

        document.getElementById("table").innerHTML = html;

    }catch(err){
        alert("API Error / Server not running");
        console.log(err);
    }
}

</script>

</body>
</html>
